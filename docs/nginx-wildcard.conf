# Shiksha Portal — Nginx wildcard subdomain config (T03)
# Deploy on Oracle Cloud VM. SSL terminated at Cloudflare (Full strict).

upstream shikshaportal_puma {
  server 127.0.0.1:3000 fail_timeout=0;
}

# Redirect apex to www or app landing (optional)
server {
  listen 80;
  server_name shikshaportal.in www.shikshaportal.in;
  return 301 https://shikshaportal.in$request_uri;
}

# Wildcard — each school subdomain routes to Rails
server {
  listen 80;
  server_name *.shikshaportal.in;

  client_max_body_size 20M;

  location / {
    proxy_pass http://shikshaportal_puma;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }
}

