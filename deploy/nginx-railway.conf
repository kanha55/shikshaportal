# Nginx for Railway Docker — mirrors docs/nginx-wildcard.conf (Oracle VM).
# ${PORT} is substituted at container start (Railway injects PORT).
# Puma runs on 127.0.0.1:3000 internally.

upstream shikshaportal_puma {
  server 127.0.0.1:3000 fail_timeout=0;
}

server {
  listen ${PORT};
  server_name _;

  root /srv/frontend/dist;
  index index.html;

  client_max_body_size 20M;

  # Security headers (inherited by all locations that define no add_header of their own).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

  location ^~ /api/ {
    proxy_pass http://shikshaportal_puma;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location = /up {
    proxy_pass http://shikshaportal_puma;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
  }

  location ^~ /rails/active_storage/ {
    proxy_pass http://shikshaportal_puma;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
